<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=2.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fff" />
    <meta name="google" content="nositelinkssearchbox" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,500;1,300;1,500&display=swap" />
    <link rel="icon" href="/favicon/light/favicon.ico" sizes="any" data-favicon-theme="light" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="/favicon/light/favicon-32x32.png" sizes="32x32" type="image/png" data-favicon-theme="light" media="(prefers-color-scheme: light)" />
    <link rel="apple-touch-icon" href="/favicon/light/apple-touch-icon-180x180.png" sizes="180x180" data-favicon-theme="light" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="/favicon/dark/favicon.ico" sizes="any" data-favicon-theme="dark" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="/favicon/dark/favicon-32x32.png" sizes="32x32" type="image/png" data-favicon-theme="dark" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" href="/favicon/dark/apple-touch-icon-180x180.png" sizes="180x180" data-favicon-theme="dark" media="(prefers-color-scheme: dark)" />
    <link rel="manifest" href="/favicon/dark/manifest.json" />
    <script>(function(){try{var t=localStorage.getItem("zero-theme");var r=t==="light"?"light":t==="dark"?"dark":window.matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";document.documentElement.dataset.theme=r;document.querySelectorAll("[data-favicon-theme]").forEach(function(l){l.media=l.dataset.faviconTheme===r?"":"not all"})}catch(e){}})()</script>
    <!--pyreon-head-->
  </head>
  <body>
    <div id="app"><!--pyreon-app--></div>
    <script type="module" src="/src/entry-client.ts"></script>
  </body>
</html>
